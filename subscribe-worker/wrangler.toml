name = "carbon-simple-subscribe"
main = "src/index.js"
compatibility_date = "2024-12-01"

# After creating the KV namespace, replace these placeholders:
# 1. Run: npx wrangler kv namespace create SUBSCRIBERS
# 2. Copy the "id" value from the output
# 3. Replace YOUR_KV_NAMESPACE_ID below

kv_namespaces = [
    { binding = "SUBSCRIBERS", id = "YOUR_KV_NAMESPACE_ID" }
]

# Optional: set custom domain
# routes = [
#     { pattern = "subscribe.carbon-simple.pages.dev", custom_domain = true }
# ]
